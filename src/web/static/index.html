<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商智能客服</title>
    <!-- 使用 CDN 确保加载可靠 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <style>
        :root {
            --border-radius: 16px;
            --primary-color: #3b82f6;
            --background-color: #f8f7f6;
            --shadow-color: #00000056;
            --input-box-bg-color: #ffffffcb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Consolas", "微软雅黑", sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: var(--background-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        #dialog-area {
            flex: 1;
            width: 100%;
            max-width: 900px;
            padding: 16px;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
        }

        .message-bubble {
            display: inline-flex;
            flex-direction: column;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: var(--border-radius);
            font-size: 16px;
            line-height: 1.5;
            word-break: break-word;
        }

        .new-message {
            animation: messageAppear 0.3s ease;
        }

        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        .user-message {
            background-color: var(--primary-color);
            align-self: flex-end;
            color: white;
            box-shadow: 0 2px 4px var(--shadow-color);
        }

        .bot-message {
            align-self: flex-start;
            color: black;
        }

        .input-box {
            width: 100%;
            max-width: 900px;
            padding: 16px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 8px var(--shadow-color);
            position: sticky;
            bottom: 16px;
            transition: all 0.3s ease;
            background-color: var(--input-box-bg-color);
            border: 2px solid transparent;
        }

        .input-box:hover {
            box-shadow: 0 4px 8px var(--primary-color);
        }

        .input-box:focus-within {
            border: 2px solid var(--primary-color);
        }

        #user-input {
            width: 100%;
            padding: 8px;
            font-size: 16px;
            max-height: 200px;
            overflow-y: auto;
            resize: none;
            border: none;
            outline: none;
            background-color: #ffffff00;
        }

        .input-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stream-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            user-select: none;
        }

        .stream-toggle input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        /* ---------- 按钮组 ---------- */
        .input-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        #send-btn {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--primary-color);
        }

        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }

        #send-btn:active {
            transform: translateY(0);
        }

        #send-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ---------- 语音按钮 ---------- */
        .mic-btn {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 50%;
            border: none;
            background-color: #e5e7eb;
            color: #6b7280;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            outline: none;
        }

        .mic-btn:hover {
            background-color: #d1d5db;
            transform: scale(1.05);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        /* 麦克风图标 */
        .mic-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* 处理中的旋转器 */
        .mic-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* 正在听取语音（红色脉冲） */
        .mic-btn.listening {
            background-color: #ef4444;
            color: #ffffff;
            animation: micPulse 1.5s ease-in-out infinite;
        }

        .mic-btn.listening:hover {
            background-color: #dc2626;
        }

        @keyframes micPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(239, 68, 68, 0);
            }
        }

        /* 处理中状态 */
        .mic-btn.processing {
            background-color: #f59e0b;
            color: #ffffff;
            cursor: default;
            pointer-events: none;
        }

        .mic-btn.processing .mic-icon {
            display: none;
        }

        .mic-btn.processing .mic-spinner {
            display: block;
        }

        /* 禁用状态 */
        .mic-btn:disabled {
            background-color: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        /* 错误提示 */
        .mic-error {
            display: none;
            font-size: 12px;
            color: #ef4444;
            margin-right: 4px;
            max-width: 240px;
            text-align: right;
            line-height: 1.3;
            animation: fadeInOut 4s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ---------- 加载与指示器 ---------- */
        .loading-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .loader {
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 打字指示器（流式响应时显示） */
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 0 2px 0;
            margin-top: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #999;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .markdown-content {
            max-width: 100%;
            overflow-x: auto;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3 {
            margin: 1em 0 0.5em;
            color: var(--primary-color);
        }

        .markdown-content p {
            margin: 0.5em 0;
            line-height: 1.6;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0.5em 0;
            padding-left: 2em;
        }

        .markdown-content code {
            background-color: rgba(192, 192, 192, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }

        .markdown-content pre {
            background-color: #f6f8fa;
            padding: 1em;
            border-radius: var(--border-radius);
            overflow-x: auto;
            margin: 1em 0;
        }

        .markdown-content pre code {
            background: none;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="dialog-area">
        <div class="bot-message message-bubble">您好！我是电商智能客服，请问有什么需要我帮忙的？</div>
    </div>
    <div class="input-box">
        <textarea id="user-input" placeholder="需要我做什么？"></textarea>
        <div class="input-controls">
            <label class="stream-toggle" title="开启后回复将逐字显示">
                <input type="checkbox" id="stream-toggle" checked>
                <span>流式响应</span>
            </label>
            <div class="input-actions">
                <span id="mic-error" class="mic-error"></span>
                <button id="mic-btn" class="mic-btn" title="语音输入" aria-label="语音输入">
                    <span class="mic-icon">&#x1F3A4;</span>
                    <span class="mic-spinner"></span>
                </button>
                <button id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        if (typeof marked === 'undefined') console.error("marked not loaded");
        if (typeof DOMPurify === 'undefined') console.error("DOMPurify not loaded");

        const dialogArea = document.getElementById('dialog-area');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const streamToggle = document.getElementById('stream-toggle');
        const micBtn = document.getElementById('mic-btn');
        const micError = document.getElementById('mic-error');
        const loadingBubble = createLoadingBubble();

        // ---------- 语音识别（MediaRecorder + 后端 Whisper）----------
        let mediaRecorder = null;
        let audioChunks = [];
        let isListening = false;
        let autoSendTimeout = null;

        // 检测 MediaRecorder 是否可用
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            console.log('✅ 语音输入已就绪 (MediaRecorder + Whisper)');
        } else {
            // 浏览器不支持麦克风访问：隐藏按钮
            micBtn.style.display = 'none';
            console.log('⚠️ MediaRecorder 不可用，语音按钮已隐藏');
        }

        micBtn.addEventListener('click', function() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });

        async function startListening() {
            if (isListening) return;
            clearMicError();
            audioChunks = [];
            isListening = true;
            micBtn.classList.add('listening');
            micBtn.classList.remove('processing');
            micBtn.title = '正在录音...点击停止';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

                mediaRecorder.ondataavailable = function(event) {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = async function() {
                    // 停止所有麦克风轨道
                    stream.getTracks().forEach(track => track.stop());

                    if (audioChunks.length === 0) {
                        showMicError('未录到音频，请重试');
                        resetMicButton();
                        return;
                    }

                    // 进入处理状态
                    micBtn.classList.remove('listening');
                    micBtn.classList.add('processing');

                    // 组装音频 blob
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    console.log('🎤 录音完成，大小:', (audioBlob.size / 1024).toFixed(1), 'KB');

                    // 发送到后端 Whisper 识别
                    try {
                        const formData = new FormData();
                        formData.append('file', audioBlob, 'recording.webm');

                        const response = await fetch('/api/voice', {
                            method: 'POST',
                            body: formData,
                        });

                        if (!response.ok) {
                            throw new Error('服务器响应 ' + response.status);
                        }

                        const result = await response.json();
                        console.log('📝 识别结果:', result);

                        if (result.success && result.text) {
                            input.value = result.text;
                            input.style.height = 'auto';
                            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
                            clearMicError();

                            // 短暂延时后自动发送
                            clearTimeout(autoSendTimeout);
                            autoSendTimeout = setTimeout(function() {
                                if (input.value.trim()) {
                                    sendMessage();
                                }
                                resetMicButton();
                            }, 1000);
                        } else {
                            showMicError(result.error || '语音识别失败，请重试');
                            resetMicButton();
                        }
                    } catch (err) {
                        console.error('语音识别请求失败:', err);
                        showMicError('语音识别服务异常，请检查服务器是否在运行');
                        resetMicButton();
                    }
                };

                mediaRecorder.start();
                console.log('🎤 开始录音...');
            } catch (err) {
                console.error('麦克风访问失败:', err);
                isListening = false;
                if (err.name === 'NotAllowedError') {
                    showMicError('麦克风权限被拒绝，请在浏览器地址栏左侧点击锁图标 → 允许麦克风');
                } else if (err.name === 'NotFoundError') {
                    showMicError('未找到麦克风设备，请检查麦克风是否已连接');
                } else {
                    showMicError('无法访问麦克风: ' + err.message);
                }
                resetMicButton();
            }
        }

        function stopListening() {
            isListening = false;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                console.log('🎤 停止录音');
            }
        }

        function resetMicButton() {
            isListening = false;
            micBtn.classList.remove('listening', 'processing');
            micBtn.title = '语音输入';
            clearTimeout(autoSendTimeout);
        }

        function showMicError(msg) {
            micError.textContent = msg;
            micError.style.display = 'block';
            // 重新触发动画
            micError.style.animation = 'none';
            micError.offsetHeight; // 强制回流
            micError.style.animation = 'fadeInOut 4s ease forwards';
        }

        function clearMicError() {
            micError.textContent = '';
            micError.style.display = 'none';
        }

        // ---------- 配置 marked ----------
        if (typeof marked !== 'undefined') {
            marked.setOptions({
                breaks: false,
            });
        }

        // ---------- 发送消息（入口） ----------
        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            sendBtn.disabled = true;
            addMessage(message, true);
            input.value = '';
            input.style.height = 'auto';

            const useStreaming = streamToggle.checked;

            if (useStreaming) {
                await sendMessageStream(message);
            } else {
                await sendMessageNonStream(message);
            }

            sendBtn.disabled = false;
        }

        // ---------- 非流式（原有逻辑） ----------
        async function sendMessageNonStream(message) {
            dialogArea.appendChild(loadingBubble);
            window.scrollTo(0, document.body.scrollHeight);

            let responseContent = '';
            try {
                console.log("Sending message:", message);
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                console.log("Response status:", response.status);
                if (!response.ok) {
                    throw new Error(`HTTP error ${response.status}`);
                }
                const data = await response.json();
                console.log("Response data:", data);
                responseContent = data.message;
            } catch (error) {
                console.error("Fetch error:", error);
                responseContent = '系统暂时无法响应，请稍后再试😥';
            } finally {
                if (loadingBubble.parentNode) loadingBubble.remove();
            }

            if (responseContent) {
                addMessage(responseContent, false);
            }
        }

        // ---------- 流式响应 ----------
        async function sendMessageStream(message) {
            // 创建流式气泡（含内容区和打字指示器）
            const bubble = createStreamingBubble();
            dialogArea.appendChild(bubble);
            window.scrollTo(0, document.body.scrollHeight);

            let accumulatedText = '';

            try {
                console.log("Sending streaming message:", message);
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // 按行分割 SSE 事件
                    const lines = buffer.split('\n');
                    // 最后一行可能不完整，保留到下次处理
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed) continue;

                        if (trimmed.startsWith('data:')) {
                            const payload = trimmed.slice(5).trim();

                            // SSE 结束标记
                            if (payload === '[DONE]') {
                                // 跳出外层 while 循环
                                // 通过清空 buffer 并设置一个标志
                                buffer = '';
                                // 使用一个技巧：让 reader 在下一次迭代自然结束
                                // 实际上我们在这里 break 内层循环，外层 while 会在 reader.read() 返回 done 时结束
                                continue;
                            }

                            try {
                                const json = JSON.parse(payload);
                                // 支持多种 token 字段名
                                const token = json.token || json.content || json.delta || '';
                                if (token) {
                                    accumulatedText += token;
                                    updateStreamingBubble(bubble, accumulatedText);
                                }
                                // 支持完整消息字段
                                if (json.message && !accumulatedText) {
                                    accumulatedText = json.message;
                                    updateStreamingBubble(bubble, accumulatedText);
                                }
                            } catch (parseErr) {
                                // 忽略无法解析的 SSE 行
                                console.warn('SSE parse warning:', parseErr, 'payload:', payload);
                            }
                        }
                    }
                }

                // 流结束，最终渲染
                finalizeStreamingBubble(bubble, accumulatedText);
            } catch (error) {
                console.error("Stream error:", error);
                finalizeStreamingBubbleError(bubble, '系统暂时无法响应，请稍后再试😥');
            }
        }

        // ---------- 流式气泡辅助函数 ----------

        function createStreamingBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble', 'bot-message', 'new-message');

            const contentDiv = document.createElement('div');
            contentDiv.className = 'markdown-content';
            bubble.appendChild(contentDiv);

            const typingIndicator = document.createElement('div');
            typingIndicator.className = 'typing-indicator';
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('span');
                typingIndicator.appendChild(dot);
            }
            bubble.appendChild(typingIndicator);

            return bubble;
        }

        function updateStreamingBubble(bubble, text) {
            const contentDiv = bubble.querySelector('.markdown-content');
            if (contentDiv && typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
                const dirty = marked.parse(text);
                contentDiv.innerHTML = DOMPurify.sanitize(dirty, {
                    ADD_TAGS: ["iframe"],
                    ADD_ATTR: ["allowfullscreen"]
                });
            } else if (contentDiv) {
                // 降级：纯文本展示
                contentDiv.textContent = text;
            }
            window.scrollTo(0, document.body.scrollHeight);
        }

        function finalizeStreamingBubble(bubble, text) {
            // 移除打字指示器
            const indicator = bubble.querySelector('.typing-indicator');
            if (indicator) indicator.remove();

            // 最终渲染
            const contentDiv = bubble.querySelector('.markdown-content');
            if (contentDiv) {
                if (text) {
                    if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
                        const dirty = marked.parse(text);
                        contentDiv.innerHTML = DOMPurify.sanitize(dirty, {
                            ADD_TAGS: ["iframe"],
                            ADD_ATTR: ["allowfullscreen"]
                        });
                    } else {
                        contentDiv.textContent = text;
                    }
                } else {
                    contentDiv.textContent = '（空响应）';
                }
            }

            // 处理入场动画
            bubble.addEventListener('animationend', function handler() {
                bubble.classList.remove('new-message');
                bubble.removeEventListener('animationend', handler);
            });

            window.scrollTo(0, document.body.scrollHeight);
        }

        function finalizeStreamingBubbleError(bubble, errorMsg) {
            const indicator = bubble.querySelector('.typing-indicator');
            if (indicator) indicator.remove();

            const contentDiv = bubble.querySelector('.markdown-content');
            if (contentDiv) {
                contentDiv.textContent = errorMsg;
                contentDiv.style.color = '#e53e3e';
            }

            bubble.addEventListener('animationend', function handler() {
                bubble.classList.remove('new-message');
                bubble.removeEventListener('animationend', handler);
            });

            window.scrollTo(0, document.body.scrollHeight);
        }

        // ---------- 通用辅助函数 ----------

        // 自动调整输入框高度
        input.addEventListener('input', function() {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 200) + 'px';
        });

        // 监听回车键
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function createLoadingBubble() {
            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble', 'bot-message', 'new-message');
            const loadingContainer = document.createElement('div');
            loadingContainer.className = 'loading-container';
            const loader = document.createElement('div');
            loader.className = 'loader';
            loadingContainer.appendChild(loader);
            loadingContainer.appendChild(document.createTextNode('正在思索中...'));
            bubble.appendChild(loadingContainer);
            return bubble;
        }

        function addMessage(content, isUser) {
            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble', isUser ? 'user-message' : 'bot-message', 'new-message');
            if (!isUser) {
                const markdownContainer = document.createElement('div');
                markdownContainer.className = 'markdown-content';
                const dirty = marked.parse(content.toString());
                markdownContainer.innerHTML = DOMPurify.sanitize(dirty, {
                    ADD_TAGS: ["iframe"],
                    ADD_ATTR: ["allowfullscreen"]
                });
                bubble.appendChild(markdownContainer);
            } else {
                bubble.textContent = content;
            }
            bubble.addEventListener('animationend', function handler() {
                this.classList.remove('new-message');
                this.removeEventListener('animationend', handler);
            });
            dialogArea.appendChild(bubble);
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
